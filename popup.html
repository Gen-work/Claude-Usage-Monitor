<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Claude Usage Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px; max-height: 520px; overflow-y: auto;
      background: #1a1714;
      color: #f0ede8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
    }

    /* Scrollbar */
    body::-webkit-scrollbar { width: 5px; }
    body::-webkit-scrollbar-track { background: transparent; }
    body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 3px; }
    body::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.22); }

    .header {
      display: flex; align-items: center; gap: 10px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .header-icon {
      width: 28px; height: 28px; color: #d97757; flex-shrink: 0;
      cursor: pointer; transition: transform .3s ease;
    }
    .header-icon:hover { transform: scale(1.1); }
    .header-icon path { transform-origin: 50px 50px; }
    .header h1 { font-size: 14px; font-weight: 600; color: #f0ede8; }
    .header .sub { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 1px; }

    /* ── Reset button ── */
    .reset-wrap { padding: 6px 12px 0; }
    .reset-btn {
      width: 100%; padding: 6px; border-radius: 6px; cursor: pointer;
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
      color: rgba(255,255,255,.35); font-size: 11px; transition: all .15s;
    }
    .reset-btn:hover {
      background: rgba(224,82,82,.1); border-color: rgba(224,82,82,.2); color: rgba(224,82,82,.8);
    }

    /* ── Usage card ── */
    .usage-card {
      margin: 12px 12px 0;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 12px;
      padding: 12px 14px;
    }
    .usage-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .usage-label { color: rgba(255,255,255,.45); font-size: 11.5px; }
    .usage-val   { font-weight: 600; color: #e8a87c; font-variant-numeric: tabular-nums; }
    .prog-track  { height: 4px; border-radius: 2px; background: rgba(255,255,255,.1); overflow: hidden; }
    .prog-fill   { height: 100%; border-radius: 2px; background: linear-gradient(90deg,#d97757,#e8a87c); transition: width .5s ease; }
    .reset-row   { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
    .reset-label { color: rgba(255,255,255,.35); font-size: 11px; }
    .reset-val   { color: rgba(255,255,255,.65); font-size: 11px; font-variant-numeric: tabular-nums; }

    /* ── Loading / error ── */
    .loading { display: flex; align-items: center; gap: 8px; padding: 12px 0 4px; color: rgba(255,255,255,.4); font-size: 12px; }
    .spin { width:14px; height:14px; border:2px solid rgba(255,255,255,.1); border-top-color:#d97757; border-radius:50%; animation:spin .9s linear infinite; flex-shrink:0; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .error-msg { padding: 10px 0 2px; color: rgba(255,100,100,.8); font-size: 12px; }

    /* ── Settings ── */
    .section-title {
      padding: 12px 16px 6px;
      font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,.3);
      letter-spacing: .04em; text-transform: uppercase;
    }
    .setting-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 14px;
      border-radius: 8px; margin: 0 8px 2px;
    }
    .setting-row:hover { background: rgba(255,255,255,.04); }
    .setting-info .s-label { font-size: 13px; color: rgba(255,255,255,.82); }
    .setting-info .s-sub   { font-size: 11px; color: rgba(255,255,255,.35); margin-top: 2px; }

    /* Toggle switch */
    .toggle { position:relative; width:36px; height:20px; flex-shrink:0; }
    .toggle input { opacity:0; width:0; height:0; }
    .toggle-track {
      position:absolute; inset:0; border-radius:20px;
      background:rgba(255,255,255,.12); cursor:pointer; transition:background .2s;
    }
    .toggle input:checked + .toggle-track { background:#d97757; }
    .toggle-thumb {
      position:absolute; top:3px; left:3px;
      width:14px; height:14px; border-radius:50%;
      background:#fff; transition:transform .2s; pointer-events:none;
    }
    .toggle input:checked ~ .toggle-thumb { transform:translateX(16px); }

    /* Slider row */
    .slider-row {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 14px 8px; margin: 0 8px;
    }
    .slider-row label { font-size: 11px; color: rgba(255,255,255,.35); flex-shrink:0; min-width:60px; }
    .slider-row input[type=range] {
      flex:1; height:4px; appearance:none; background:rgba(255,255,255,.12); border-radius:2px; cursor:pointer;
    }
    .slider-row input[type=range]::-webkit-slider-thumb {
      appearance:none; width:12px; height:12px; border-radius:50%; background:#d97757; cursor:pointer;
    }
    .slider-val { font-size: 11px; color:rgba(255,255,255,.45); width:28px; text-align:right; flex-shrink:0; }

    /* Gradient color picker */
    .gradient-row {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px 10px; margin: 0 8px;
      position: relative;
    }
    .gradient-emoji { font-size: 14px; flex-shrink: 0; line-height: 1; }
    .gradient-bar {
      flex: 1; height: 18px; border-radius: 9px; position: relative;
      background: linear-gradient(to right, #d97757, #c96442, #e05252);
      border: 1px solid rgba(255,255,255,.1);
    }
    /* Color stops — native input[type=color] */
    .g-stop {
      position: absolute; top: 50%; width: 16px; height: 16px;
      border-radius: 50%; border: 2px solid rgba(255,255,255,.5);
      cursor: pointer; transition: border-color .15s;
      -webkit-appearance: none; appearance: none; padding: 0;
    }
    .g-stop::-webkit-color-swatch-wrapper { padding: 0; }
    .g-stop::-webkit-color-swatch { border: none; border-radius: 50%; }
    .g-stop:hover { border-color: rgba(255,255,255,.9); }
    .g-stop.hi { left: -3px; transform: translateY(-50%); }
    .g-stop.lo { right: -3px; left: auto; transform: translateY(-50%); }
    /* Mid drag handle */
    .g-mid-handle {
      position: absolute; top: 50%; width: 16px; height: 16px;
      border-radius: 50%; border: 2.5px solid rgba(255,255,255,.75);
      cursor: ew-resize; background: rgba(0,0,0,.15);
      transform: translate(-50%, -50%);
      box-shadow: 0 1px 4px rgba(0,0,0,.4); transition: border-color .15s;
    }
    .g-mid-handle:hover, .g-mid-handle.dragging { border-color: #fff; }
    /* Hover tooltip above gradient bar */
    .color-tip {
      position: absolute; left: 50%; transform: translateX(-50%);
      bottom: calc(100% - 2px);
      background: rgba(16,14,12,.92); color: rgba(255,255,255,.75);
      font-size: 10.5px; padding: 3px 9px; border-radius: 5px;
      white-space: nowrap; pointer-events: none;
      opacity: 0; transition: opacity .18s;
      border: 1px solid rgba(255,255,255,.1);
    }
    .color-tip.on { opacity: 1; }
    /* Halo section title row */
    .halo-title {
      display: flex; justify-content: space-between; align-items: center;
    }
    .halo-reset-btn {
      padding: 2px 8px; border-radius: 6px;
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07);
      color: rgba(255,255,255,.3); font-size: 11px; cursor: pointer;
      transition: all .15s; text-transform: none; letter-spacing: 0; font-weight: 400;
    }
    .halo-reset-btn:hover { background: rgba(224,82,82,.1); border-color: rgba(224,82,82,.2); color: rgba(224,82,82,.7); }

    /* Language selector */
    .lang-row {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      padding: 6px 14px 10px; margin: 0 8px;
    }
    .lang-btn {
      padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,.1);
      background: transparent; color: rgba(255,255,255,.5); font-size: 11px;
      cursor: pointer; transition: all .15s ease;
    }
    .lang-btn:hover { background: rgba(255,255,255,.06); color: rgba(255,255,255,.7); }
    .lang-btn.active { border-color: #d97757; color: #d97757; background: rgba(217,119,87,.08); }

    .divider { height:1px; background:rgba(255,255,255,.06); margin:8px 12px; }
    .footer { padding: 10px 16px 14px; color:rgba(255,255,255,.25); font-size:10.5px; }

    /* ── Zen mode ── */
    #zen-view {
      display: none; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 0; cursor: pointer;
    }
    .zen-logo { width: 80px; height: 80px; color: #d97757; animation: zen-spin 12s linear infinite; }
    .zen-logo path { transform-origin: 50px 50px; }
    .zen-hint { margin-top: 16px; color: rgba(255,255,255,.2); font-size: 11px; }
    @keyframes zen-spin { to { transform: rotate(360deg); } }
  </style>
</head>

      </svg>
      <div>
        <h1 data-i18n="title">Claude 用量监控</h1>
        <div class="sub" id="last-updated" data-i18n="loading">正在加载…</div>
      </div>
    </div>

    <!-- Reset button -->
    <div class="reset-wrap">
      <button id="btn-reset" class="reset-btn" data-i18n="resetAll">重置所有设置</button>
    </div>

    <!-- Usage display -->
    <div class="usage-card">
      <div id="loading" class="loading">
        <div class="spin"></div> <span data-i18n="loadingData">读取用量数据…</span>
      </div>
      <div id="usage-body" style="display:none">
        <div class="usage-row">
          <span class="usage-label" data-i18n="windowRemain">5小时窗口剩余</span>
          <span class="usage-val" id="pct-val">—</span>
        </div>
        <div class="prog-track"><div class="prog-fill" id="prog" style="width:100%"></div></div>
        <div class="reset-row">
          <span class="reset-label" data-i18n="resetLabel">重置</span>
          <span class="reset-val" id="reset-val">—</span>
        </div>
      </div>
      <div id="error-body" style="display:none" class="error-msg" data-i18n="errorMsg">无法获取数据，请确认已登录 Claude.ai</div>
    </div>

    <div class="divider"></div>

    <!-- Float icon settings -->
    <div class="section-title" data-i18n="floatSection">悬浮图标</div>
    <div class="setting-row">
      <div class="setting-info">
        <div class="s-label" data-i18n="enableFloat">启用悬浮 Claude 图标</div>
        <div class="s-sub" data-i18n="enableFloatSub">在网页右下角显示用量饼图</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="tog-float">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div class="setting-row" id="watermark-row" style="opacity:.45;pointer-events:none">
      <div class="setting-info">
        <div class="s-label" data-i18n="watermarkLabel">水印模式</div>
        <div class="s-sub" data-i18n="watermarkSub">鼠标穿透，不遮挡页面内容</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="tog-wm">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div class="setting-row" id="allpages-row" style="opacity:.45;pointer-events:none">
      <div class="setting-info">
        <div class="s-label" data-i18n="allPages">跨页显示</div>
        <div class="s-sub" data-i18n="allPagesSub">在任意网页显示悬浮图标</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="tog-allpages">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div class="slider-row" id="opacity-row" style="opacity:.45;pointer-events:none">
      <label data-i18n="opacityLabel">透明度</label>
      <input type="range" id="opacity-slider" min="10" max="100" value="100" step="5">
      <span class="slider-val" id="opacity-label">100%</span>
    </div>

    <div class="divider"></div>

    <!-- Halo settings -->
    <div class="section-title halo-title">
      <span data-i18n="haloSection">呼吸灯设置</span>
      <button id="btn-reset-colors" class="halo-reset-btn" style="display:none" data-i18n="resetColors">重置颜色</button>
    </div>
    <div class="slider-row">
      <label data-i18n="activeIntensity">输入时强度</label>
      <input type="range" id="halo-active-slider" min="0" max="100" value="100" step="5">
      <span class="slider-val" id="halo-active-label">100%</span>
    </div>
    <div class="slider-row">
      <label data-i18n="idleIntensity">待机时强度</label>
      <input type="range" id="halo-idle-slider" min="0" max="100" value="50" step="5">
      <span class="slider-val" id="halo-idle-label">50%</span>
    </div>
    <!-- Gradient color bar -->
    <div class="gradient-row">
      <span class="gradient-emoji">🔋</span>
      <div class="gradient-bar" id="gradient-bar">
        <input type="color" class="g-stop hi" id="color-hi" value="#d97757">
        <div class="g-mid-handle" id="gmid-handle"></div>
        <input type="color" class="g-stop lo" id="color-lo" value="#e05252">
        <input type="color" id="color-mid-picker" value="#c96442"
          style="position:fixed;opacity:0;pointer-events:none;width:1px;height:1px;top:-9999px">
      </div>
      <span class="gradient-emoji">🪫</span>
      <div class="color-tip" id="color-tip" data-i18n="clickColor">点击以自定义颜色</div>
    </div>

    <div class="divider"></div>

    <div class="section-title" data-i18n="language">语言</div>
    <div class="lang-row" id="lang-row"></div>

    <div class="footer" data-i18n="footer">图标可拖拽移动 · 右键可快速设置</div>

  <script src="i18n.js"></script>
